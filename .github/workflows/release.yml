name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to rebuild, e.g. cliprithm-v1.3.2'
        required: false
        default: ''
      release_version:
        description: 'Existing release version to rebuild, e.g. 1.3.2'
        required: false
        default: ''
      pkgrel:
        description: 'AUR package release number (pkgrel), e.g. 1 or 2'
        required: false
        default: '1'

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Step 1: release-please creates/updates a release PR with changelog
  # When merged, it creates a GitHub release + git tag automatically
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created == 'true' || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '' && inputs.release_version != '') }}
      tag_name: ${{ steps.release.outputs.tag_name || inputs.release_tag }}
      version: ${{ steps.release.outputs.version || inputs.release_version }}
      pkgrel: ${{ inputs.pkgrel || '1' }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Step 2: Build Linux + Windows (always when release is created)
  build-linux-windows:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install FFmpeg (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: sudo apt-get install -y ffmpeg

      - name: Install FFmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        run: choco install ffmpeg -y

      - name: Bundle FFmpeg binaries for sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          $ffmpegPath = (Get-Command ffmpeg -ErrorAction Stop).Source
          $ffprobePath = (Get-Command ffprobe -ErrorAction Stop).Source
          Copy-Item $ffmpegPath src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe
          Copy-Item $ffprobePath src-tauri/binaries/ffprobe-x86_64-pc-windows-msvc.exe
          Write-Host "Bundled FFmpeg: $ffmpegPath"
          Write-Host "Bundled FFprobe: $ffprobePath"

      - name: Sync release version across app files
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"]

          package_json_path = Path("package.json")
          package_json = json.loads(package_json_path.read_text(encoding="utf-8"))
          package_json["version"] = version
          package_json_path.write_text(json.dumps(package_json, indent=2) + "\n", encoding="utf-8")

          tauri_conf_path = Path("src-tauri/tauri.conf.json")
          tauri_conf = json.loads(tauri_conf_path.read_text(encoding="utf-8"))
          tauri_conf["version"] = version
          tauri_conf_path.write_text(json.dumps(tauri_conf, indent=2) + "\n", encoding="utf-8")

          cargo_toml_path = Path("src-tauri/Cargo.toml")
          cargo_toml = cargo_toml_path.read_text(encoding="utf-8")
          cargo_toml, replacements = re.subn(
              r'(?m)^version = "[^"]+"$',
              f'version = "{version}"',
              cargo_toml,
              count=1,
          )
          if replacements != 1:
              raise SystemExit("Failed to update package.version in src-tauri/Cargo.toml")
          cargo_toml_path.write_text(cargo_toml, encoding="utf-8")

          print(f"Synchronized release version {version}")
          PY

      - name: Validate updater signing secrets
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ] || [ -z "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ]; then
            echo "::error::Missing TAURI_SIGNING_PRIVATE_KEY and/or TAURI_SIGNING_PRIVATE_KEY_PASSWORD secrets."
            echo "::error::Generate them with: pnpm run tauri signer generate -- -w ~/.tauri/cliprithm.key"
            echo "::error::Store the private key content or path in TAURI_SIGNING_PRIVATE_KEY and the passphrase in TAURI_SIGNING_PRIVATE_KEY_PASSWORD."
            exit 1
          fi

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          LINUXDEPLOY_EXCLUDE_LIBS: "libwebkit2gtk-4.1.so.0;libjavascriptcoregtk-4.1.so.0;libwayland-client.so.0;libwayland-egl.so.1;libwayland-server.so.0;libwayland-cursor.so.0;libepoxy.so.0;libEGL.so.1;libGL.so.1;libgbm.so.1;libgtk-3.so.0;libgdk-3.so.0;libpango-1.0.so.0;libpangocairo-1.0.so.0;libpangoft2-1.0.so.0;libcairo.so.2;libcairo-gobject.so.2;libgdk_pixbuf-2.0.so.0;libatk-1.0.so.0;libatk-bridge-2.0.so.0;libffi.so.8;libffi.so.7;libglapi.so.0;libGLX.so.0;libGLdispatch.so.0;libX11.so.6"
        run: pnpm run tauri build -- --target ${{ matrix.target }}

      - name: Purge system libraries from AppImage (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          # 1. Download appimagetool
          wget -O /tmp/appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /tmp/appimagetool

          # 2. Find the generated AppImage
          appimage_path=$(find src-tauri/target -type f -path "*/release/bundle/appimage/Cliprithm_${RELEASE_VERSION}_amd64.AppImage" | head -n 1)
          if [ -z "$appimage_path" ]; then
            echo "No AppImage found to purge!"
            exit 1
          fi
          echo "Found generated AppImage: $appimage_path"

          # 3. Extract the AppImage
          appimage_dir=$(dirname "$appimage_path")
          cd "$appimage_dir"
          appimage_filename=$(basename "$appimage_path")
          APPIMAGE_EXTRACT_AND_RUN=1 ./"$appimage_filename" --appimage-extract

          # 4. Purge all bundled system libraries
          rm -rf squashfs-root/usr/lib/*.so* squashfs-root/usr/lib/x86_64-linux-gnu

          # 5. Repack the AppImage
          rm -f "$appimage_filename"
          ARCH=x86_64 /tmp/appimagetool squashfs-root "$appimage_filename"
          chmod +x "$appimage_filename"

          # 6. Clean up extracted directory
          rm -rf squashfs-root
          cd -

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
          RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          mapfile -t assets < <(
            find src-tauri/target -type f -path '*/release/bundle/*' \
              \( -name "*${RELEASE_VERSION}*.AppImage" -o -name "*${RELEASE_VERSION}*.AppImage.sig" \
              -o -name "*${RELEASE_VERSION}*.deb" -o -name "*${RELEASE_VERSION}*.deb.sig" \
              -o -name "*${RELEASE_VERSION}*.rpm" -o -name "*${RELEASE_VERSION}*.rpm.sig" \
              -o -name "*${RELEASE_VERSION}*.exe" -o -name "*${RELEASE_VERSION}*.exe.sig" \
              -o -name "*${RELEASE_VERSION}*.msi" -o -name "*${RELEASE_VERSION}*.msi.sig" \) \
              | sort
          )

          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "::error::No release assets were generated."
            exit 1
          fi

          printf 'Uploading release assets:\n'
          printf '  %s\n' "${assets[@]}"
          gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber

  publish-aur:
    needs:
      - release-please
      - build-linux-windows
      - publish-latest-json
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Check AUR configuration
        id: aur-config
        shell: bash
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$AUR_SSH_PRIVATE_KEY" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping AUR publish because AUR_SSH_PRIVATE_KEY is not configured."
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Generate AUR source package files
        if: steps.aur-config.outputs.enabled == 'true'
        env:
          RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
          RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
          PKGREL: ${{ needs.release-please.outputs.pkgrel }}
        run: |
          python3 scripts/generate_aur_package.py \
            --version "$RELEASE_VERSION" \
            --tag "$RELEASE_TAG" \
            --pkgrel "$PKGREL" \
            --output-dir .artifacts/aur/source

      - name: Generate AUR binary package files
        if: steps.aur-config.outputs.enabled == 'true'
        env:
          RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
          RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
          PKGREL: ${{ needs.release-please.outputs.pkgrel }}
        run: |
          python3 scripts/generate_aur_package.py \
            --package bin \
            --version "$RELEASE_VERSION" \
            --tag "$RELEASE_TAG" \
            --pkgrel "$PKGREL" \
            --output-dir .artifacts/aur/bin

      - name: Configure SSH for AUR
        if: steps.aur-config.outputs.enabled == 'true'
        shell: bash
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Publish AUR source package repository
        if: steps.aur-config.outputs.enabled == 'true'
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
          AUR_PACKAGE_REPO_SSH_URL: ${{ vars.AUR_PACKAGE_REPO_SSH_URL }}
        run: |
          REPO_URL="${AUR_PACKAGE_REPO_SSH_URL:-ssh://aur@aur.archlinux.org/cliprithm.git}"
          git clone "$REPO_URL" /tmp/aur-cliprithm
          cp -f .artifacts/aur/source/PKGBUILD /tmp/aur-cliprithm/
          cp -f .artifacts/aur/source/.SRCINFO /tmp/aur-cliprithm/
          cp -f .artifacts/aur/source/cliprithm /tmp/aur-cliprithm/
          cp -f .artifacts/aur/source/cliprithm.desktop /tmp/aur-cliprithm/

          git -C /tmp/aur-cliprithm config user.name "github-actions[bot]"
          git -C /tmp/aur-cliprithm config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C /tmp/aur-cliprithm add PKGBUILD .SRCINFO cliprithm cliprithm.desktop

          if git -C /tmp/aur-cliprithm diff --cached --quiet; then
            echo "AUR package repository already up to date."
            exit 0
          fi

          git -C /tmp/aur-cliprithm commit -m "cliprithm ${RELEASE_VERSION}"
          git -C /tmp/aur-cliprithm push origin HEAD

      - name: Publish AUR binary package repository
        if: steps.aur-config.outputs.enabled == 'true'
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
          AUR_PACKAGE_REPO_SSH_URL: ${{ vars.AUR_PACKAGE_REPO_SSH_URL }}
        run: |
          SOURCE_REPO_URL="${AUR_PACKAGE_REPO_SSH_URL:-ssh://aur@aur.archlinux.org/cliprithm.git}"
          case "$SOURCE_REPO_URL" in
            *cliprithm.git)
              REPO_URL="${SOURCE_REPO_URL%cliprithm.git}cliprithm-bin.git"
              ;;
            *)
              echo "::error::AUR_PACKAGE_REPO_SSH_URL must end with cliprithm.git so cliprithm-bin.git can be derived automatically."
              exit 1
              ;;
          esac
          git clone "$REPO_URL" /tmp/aur-cliprithm-bin
          cp -f .artifacts/aur/bin/PKGBUILD /tmp/aur-cliprithm-bin/
          cp -f .artifacts/aur/bin/.SRCINFO /tmp/aur-cliprithm-bin/
          cp -f .artifacts/aur/bin/cliprithm /tmp/aur-cliprithm-bin/
          cp -f .artifacts/aur/bin/cliprithm.desktop /tmp/aur-cliprithm-bin/

          git -C /tmp/aur-cliprithm-bin config user.name "github-actions[bot]"
          git -C /tmp/aur-cliprithm-bin config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C /tmp/aur-cliprithm-bin add PKGBUILD .SRCINFO cliprithm cliprithm.desktop

          if git -C /tmp/aur-cliprithm-bin diff --cached --quiet; then
            echo "AUR binary package repository already up to date."
            exit 0
          fi

          git -C /tmp/aur-cliprithm-bin commit -m "cliprithm-bin ${RELEASE_VERSION}"
          git -C /tmp/aur-cliprithm-bin push origin HEAD

  publish-latest-json:
    needs:
      - release-please
      - build-linux-windows
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate updater metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
          RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import base64
          import json
          import os
          import subprocess
          import urllib.request
          from pathlib import Path

          repository = os.environ["REPOSITORY"]
          tag = os.environ["RELEASE_TAG"]
          version = os.environ["RELEASE_VERSION"]

          release = json.loads(
              subprocess.check_output(
                  ["gh", "api", f"/repos/{repository}/releases/tags/{tag}"],
                  text=True,
              )
          )
          assets = {asset["name"]: asset for asset in release["assets"]}
          platforms = {}

          def signature_for(asset_name: str) -> str:
              sig_asset = assets[f"{asset_name}.sig"]
              with urllib.request.urlopen(sig_asset["browser_download_url"]) as response:
                  return base64.b64encode(response.read()).decode("ascii")

          def add_platform(keys: list[str], asset_name: str) -> None:
              if asset_name not in assets or f"{asset_name}.sig" not in assets:
                  return

              entry = {
                  "signature": signature_for(asset_name),
                  "url": assets[asset_name]["browser_download_url"],
              }
              for key in keys:
                  platforms[key] = entry

          add_platform(
              ["linux-x86_64", "linux-x86_64-appimage"],
              f"Cliprithm_{version}_amd64.AppImage",
          )
          add_platform(["linux-x86_64-deb"], f"Cliprithm_{version}_amd64.deb")
          add_platform(["linux-x86_64-rpm"], f"Cliprithm-{version}-1.x86_64.rpm")
          add_platform(
              ["windows-x86_64", "windows-x86_64-msi"],
              f"Cliprithm_{version}_x64_en-US.msi",
          )
          add_platform(["windows-x86_64-nsis"], f"Cliprithm_{version}_x64-setup.exe")

          if not platforms:
              raise SystemExit("No signed updater platforms were found in release assets")

          latest = {
              "version": version,
              "notes": release.get("body") or "",
              "pub_date": release["published_at"],
              "platforms": platforms,
          }
          Path("latest.json").write_text(json.dumps(latest, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Upload updater metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
          REPOSITORY: ${{ github.repository }}
        run: gh release upload "$RELEASE_TAG" latest.json --repo "$REPOSITORY" --clobber

  # Step 3: Build macOS artifacts for every created release
  build-macos:
    needs: release-please
    if: ${{ false && needs.release-please.outputs.release_created }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-13
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install FFmpeg (macOS)
        run: brew install ffmpeg

      - name: Bundle FFmpeg binaries for sidecar (macOS)
        run: |
          mkdir -p src-tauri/binaries
          cp "$(which ffmpeg)" "src-tauri/binaries/ffmpeg-${{ matrix.target }}"
          cp "$(which ffprobe)" "src-tauri/binaries/ffprobe-${{ matrix.target }}"
          echo "Bundled FFmpeg: $(which ffmpeg)"
          echo "Bundled FFprobe: $(which ffprobe)"

      - name: Sync release version across app files
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"]

          package_json_path = Path("package.json")
          package_json = json.loads(package_json_path.read_text(encoding="utf-8"))
          package_json["version"] = version
          package_json_path.write_text(json.dumps(package_json, indent=2) + "\n", encoding="utf-8")

          tauri_conf_path = Path("src-tauri/tauri.conf.json")
          tauri_conf = json.loads(tauri_conf_path.read_text(encoding="utf-8"))
          tauri_conf["version"] = version
          tauri_conf_path.write_text(json.dumps(tauri_conf, indent=2) + "\n", encoding="utf-8")

          cargo_toml_path = Path("src-tauri/Cargo.toml")
          cargo_toml = cargo_toml_path.read_text(encoding="utf-8")
          cargo_toml, replacements = re.subn(
              r'(?m)^version = "[^"]+"$',
              f'version = "{version}"',
              cargo_toml,
              count=1,
          )
          if replacements != 1:
              raise SystemExit("Failed to update package.version in src-tauri/Cargo.toml")
          cargo_toml_path.write_text(cargo_toml, encoding="utf-8")

          print(f"Synchronized release version {version}")
          PY

      - name: Validate updater signing secrets
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ] || [ -z "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ]; then
            echo "::error::Missing TAURI_SIGNING_PRIVATE_KEY and/or TAURI_SIGNING_PRIVATE_KEY_PASSWORD secrets."
            echo "::error::Generate them with: pnpm run tauri signer generate -- -w ~/.tauri/cliprithm.key"
            echo "::error::Store the private key content or path in TAURI_SIGNING_PRIVATE_KEY and the passphrase in TAURI_SIGNING_PRIVATE_KEY_PASSWORD."
            exit 1
          fi

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm run tauri build -- --target ${{ matrix.target }}

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
          RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          mapfile -t assets < <(
            find src-tauri/target -type f -path '*/release/bundle/*' \
              \( -name "*${RELEASE_VERSION}*.dmg" -o -name "*${RELEASE_VERSION}*.dmg.sig" \
              -o -name "*${RELEASE_VERSION}*.app.tar.gz" -o -name "*${RELEASE_VERSION}*.app.tar.gz.sig" \) \
              | sort
          )

          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "::error::No macOS release assets were generated."
            exit 1
          fi

          printf 'Uploading release assets:\n'
          printf '  %s\n' "${assets[@]}"
          gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
