name: Feature Request
description: Suggest a new feature for Cliprithm
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
    validations:
      required: true
  - type: textarea
    id: feature
    attributes:
      label: Feature Description
      description: Describe the feature you'd like
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Video Editor
        - Silence Detection
        - Export
        - Timeline
        - UI/UX
        - Performance
        - i18n / Localization
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context or screenshots
